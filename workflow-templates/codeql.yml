name: CodeQL

on:
  push:
    branches: [$default-branch]
  pull_request_target:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  codeql:
    uses: your-org/.github/.github/workflows/codeql.yml@main
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read
