# --------------------------------------------------
# CodeQL workflow.
#
# Performs static analysis for security vulnerabilities
# and code quality issues on pushes to main, pull
# requests targeting main, and on a weekly schedule
# to catch newly published vulnerability data against
# existing code.
#
# Uses set-codeql-language-matrix to auto-detect
# supported languages from the repository, making this
# workflow portable across downstream repos that extend
# this template.
#
# Uses adjust-cvss to normalise CVSS scores before
# upload. Tune the patterns block to match your
# project's risk tolerance.
#
# For more information please see:
# https://docs.github.com/en/code-security/code-scanning
# --------------------------------------------------
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI CodeQL

on:
  push:
    branches: [$default-branch]
  pull_request:
    branches: [$default-branch]
  schedule:
    # Run weekly on Monday at 06:00 Europe/Berlin (05:00 UTC)
    - cron: "0 5 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------
  # Detect which CodeQL-supported languages are present
  # in the repository. Makes the workflow portable
  # across repos without requiring manual language
  # configuration.
  # --------------------------------------------------
  set-language-matrix:
    name: set-language-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
      actions: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Get CodeQL languages from repository
        id: set-matrix
        uses: advanced-security/set-codeql-language-matrix@v1
        with:
          access-token: ${{ secrets.GITHUB_TOKEN }}
          endpoint: ${{ github.event.repository.languages_url }}

  # --------------------------------------------------
  # CodeQL analysis - static analysis for security
  # vulnerabilities and code quality issues.
  #
  # Runs per language detected by set-language-matrix.
  # CVSS scores are normalised before upload.
  #
  # TODO: Tune the adjust-cvss patterns block to match
  # your project's risk tolerance. The default leaves
  # all scores unchanged (passthrough).
  # --------------------------------------------------
  analyze:
    name: analyze (${{ matrix.language }})
    needs: set-language-matrix
    if: ${{ needs.set-language-matrix.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-language-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
          output: sarif-results
          upload: failure-only

      - name: Adjust CVSS scores
        uses: advanced-security/adjust-cvss@v0.0.2
        with:
          # TODO: Tune patterns to your risk tolerance.
          # Format: <query-id-pattern>:<cvss-score>
          # Example to increase XSS severity: javascript/xss:9.9
          # Default passthrough — all scores unchanged.
          patterns: ""
          input: sarif-results/${{ matrix.language }}.sarif
          output: sarif-results/${{ matrix.language }}.sarif

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results/${{ matrix.language }}.sarif
          category: /language:${{ matrix.language }}
