# --------------------------------------------------
# CI Release workflow.
#
# Triggers semantic-release on pushes to release
# branches after a pull request is merged. Analyzes
# commits since the last release, determines the next
# version, generates a changelog, creates a git tag,
# and publishes a GitHub release.
#
# Required repository secrets:
# - GITHUB_TOKEN: automatically provided by GitHub
#
# Required repository permissions:
# - contents: write (create tags and release commits)
# - issues: write (comment on released issues)
# - pull-requests: write (comment on released PRs)
#
# For more information please see:
# https://semantic-release.gitbook.io/semantic-release
# --------------------------------------------------
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI Release

on:
  push:
    branches:
      - $default-branch
      - beta
      - alpha

concurrency:
  group: ${{ github.workflow }}-release
  cancel-in-progress: false

env:
  NODE_VERSION: "24.14.1"
  NPM_VERSION: "11"
  SEMANTIC_RELEASE_VERSION: "24"

jobs:
  # --------------------------------------------------
  # Release - analyzes commits since the last release,
  # determines the next version, generates changelog,
  # creates a git tag, and publishes a GitHub release
  # via semantic-release.
  #
  # Runs npm ci fresh without node_modules cache to
  # ensure a clean, predictable release environment.
  # --------------------------------------------------
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Release
        run: npx --no -- semantic-release@${{ env.SEMANTIC_RELEASE_VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
